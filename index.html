<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackNet | Pro V4</title>
    <style>
        :root { --main: #00ff88; --bg: #0d1117; --card: #161b22; --border: #30363d; --text-gray: #8b949e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }

        /* Nav */
        nav { background: var(--card); padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        nav button { background: transparent; border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; position: relative; font-size: 13px; }

        /* Estilos de Tema */
        .tema-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; cursor: pointer; display: inline-block; margin: 5px; }

        /* Cards e Posts */
        .aba { max-width: 500px; margin: 0 auto; padding: 15px; }
        .post-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; position: relative; }
        
        /* Digitando e Notif */
        .status-digitando { font-size: 11px; color: var(--main); font-style: italic; margin-left: 10px; height: 15px; }
        .notif-ponto { width: 10px; height: 10px; background: #ff4444; border-radius: 50%; position: absolute; top: -2px; right: -2px; border: 2px solid var(--card); }

        /* Chat */
        #mensagens-privadas { height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .msg-container { display: flex; flex-direction: column; max-width: 80%; }
        .msg { padding: 10px; border-radius: 10px; font-size: 14px; word-wrap: break-word; }
        .other { background: #30363d; color: white; }
        
        input, textarea { background: #000; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .search-bar { margin-bottom: 15px; border-color: var(--main); }
    </style>
</head>
<body>

    <div id="auth-screen" style="height:100vh; display:flex; justify-content:center; align-items:center;">
        <div style="background:var(--card); padding:30px; border-radius:15px; text-align:center; border:1px solid var(--border);">
            <h1>STACK<span>NET</span></h1>
            <input type="text" id="nome-usuario" placeholder="Teu nome...">
            <button onclick="entrar()" style="background:var(--main); border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">Entrar</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav>
            <button onclick="mudarAba('feed')">🔥 Feed</button>
            <button onclick="mudarAba('chat-geral')">💬 Geral</button>
            <button onclick="mudarAba('users')">👥 Privado <div id="badge-privado" class="notif-ponto hidden"></div></button>
            <button onclick="mudarAba('perfil')">👤 Perfil</button>
            <button onclick="sair()" style="color:#f44">Sair</button>
        </nav>

        <div id="aba-feed" class="aba">
            <textarea id="postInput" placeholder="O que há de novo?"></textarea>
            <button onclick="postar()" style="background:var(--main); border:none; padding:10px; width:100%; border-radius:8px; font-weight:bold;">Publicar</button>
            <div id="feed-lista" style="margin-top:20px;"></div>
        </div>

        <div id="aba-perfil" class="aba hidden">
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center; border:1px solid var(--border);">
                <h2 id="perf-nome" style="margin-bottom:15px;"></h2>
                <p>Escolha sua cor:</p>
                <div class="tema-btn" style="background:#00ff88" onclick="mudarCor('#00ff88')"></div>
                <div class="tema-btn" style="background:#0084ff" onclick="mudarCor('#0084ff')"></div>
                <div class="tema-btn" style="background:#a333ff" onclick="mudarCor('#a333ff')"></div>
                <div class="tema-btn" style="background:#ff8800" onclick="mudarCor('#ff8800')"></div>
                <textarea id="bioInput" placeholder="Sua biografia..."></textarea>
                <button onclick="salvarBio()" style="background:var(--main); border:none; padding:10px; width:100%; border-radius:8px; font-weight:bold;">Salvar Tudo</button>
            </div>
        </div>

        <div id="aba-users" class="aba hidden">
            <input type="text" id="buscaUsuario" class="search-bar" placeholder="🔍 Procurar amigo..." oninput="filtrarUsuarios()">
            <div id="lista-usuarios"></div>
            
            <div id="janela-chat" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; flex-direction:column;">
                <div style="padding:15px; background:var(--card); display:flex; gap:10px; align-items:center; border-bottom:1px solid var(--border);">
                    <button onclick="fecharChat()" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:5px;">⬅ Voltar</button>
                    <b id="chat-com-nome"></b>
                </div>
                <div id="mensagens-privadas"></div>
                <div id="texto-digitando" class="status-digitando"></div>
                <div style="padding:15px; display:flex; gap:8px; background:var(--card); border-top:1px solid var(--border);">
                    <input type="text" id="msgPrivadaInput" placeholder="Mensagem..." oninput="avisarDigitando()" style="margin:0">
                    <button onclick="enviarPrivado()" style="background:var(--main); border:none; border-radius:50%; width:50px;">➤</button>
                </div>
            </div>
        </div>

        <div id="aba-chat-geral" class="aba hidden">
            <div id="chat-geral-lista" style="height:60vh; overflow-y:auto; margin-bottom:10px;"></div>
            <div style="display:flex; gap:5px;"><input type="text" id="chatGeralInput" style="margin:0"><button onclick="enviarGeral()">Enviar</button></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, increment, getDoc, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2byHMCCdXKUT5bfBTvcw0zzsIY6uQz88",
            authDomain: "rede-social-8f031.firebaseapp.com",
            databaseURL: "https://rede-social-8f031-default-rtdb.firebaseio.com",
            projectId: "rede-social-8f031",
            storageBucket: "rede-social-8f031.firebasestorage.app",
            messagingSenderId: "439234666870",
            appId: "1:439234666870:web:b8dde1bdd07a247b61da57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNome = "", chatAtivoId = "", minhaCor = "#00ff88", digitandoTimeout;

        window.entrar = async () => {
            const nome = document.getElementById('nome-usuario').value.trim();
            if(nome) {
                meuNome = nome;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                const userDoc = await getDoc(doc(db, "usuarios", meuNome));
                if(userDoc.exists()) { minhaCor = userDoc.data().cor || "#00ff88"; }
                document.documentElement.style.setProperty('--main', minhaCor);
                await setDoc(doc(db, "usuarios", meuNome), { nome: meuNome, online: true, cor: minhaCor }, { merge: true });
                carregarPerfil(); ouvirUsuarios(); ouvirFeed(); ouvirChatGeral(); escutarNotificacoes();
            }
        };

        window.mudarCor = (cor) => {
            minhaCor = cor;
            document.documentElement.style.setProperty('--main', cor);
        };

        window.salvarBio = async () => {
            await updateDoc(doc(db, "usuarios", meuNome), { bio: document.getElementById('bioInput').value, cor: minhaCor });
            alert("Perfil atualizado!");
        };

        // --- DIGITANDO ---
        window.avisarDigitando = async () => {
            if(!chatAtivoId) return;
            const chatId = [meuNome, chatAtivoId].sort().join("_");
            await setDoc(doc(db, "digitando", chatId), { [meuNome]: true }, { merge: true });
            clearTimeout(digitandoTimeout);
            digitandoTimeout = setTimeout(async () => {
                await setDoc(doc(db, "digitando", chatId), { [meuNome]: false }, { merge: true });
            }, 2000);
        };

        window.abrirChat = (id, corOutro) => {
            chatAtivoId = id; document.getElementById('janela-chat').classList.remove('hidden');
            document.getElementById('chat-com-nome').innerText = id;
            const chatId = [meuNome, id].sort().join("_");
            
            // Escuta se o outro está digitando
            onSnapshot(doc(db, "digitando", chatId), (d) => {
                const text = d.exists() && d.data()[id] ? `${id} está digitando...` : "";
                document.getElementById('texto-digitando').innerText = text;
            });

            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(query(collection(db, `chats/${chatId}/mensagens`), orderBy("data")), (snap) => {
                const box = document.getElementById('mensagens-privadas'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.data();
                    const corBalao = d.de === meuNome ? minhaCor : (corOutro || "#333");
                    box.innerHTML += `<div class="msg-container ${d.de === meuNome ? 'me' : ''}"><div class="msg" style="background:${corBalao}; color:${d.de === meuNome ? 'black' : 'white'}">${d.texto}</div></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        // --- BUSCA ---
        window.filtrarUsuarios = () => {
            const busca = document.getElementById('buscaUsuario').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(card => {
                const nome = card.getAttribute('data-nome').toLowerCase();
                card.classList.toggle('hidden', !nome.includes(busca));
            });
        };

        // --- COMENTÁRIOS ---
        window.comentar = async (postId) => {
            const msg = prompt("Escreva seu comentário:");
            if(msg) {
                await addDoc(collection(db, `posts/${postId}/comentarios`), { nome: meuNome, texto: msg, data: Date.now() });
                alert("Comentário enviado!");
            }
        };

        // --- FEED ---
        function ouvirFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("data", "desc")), (snap) => {
                const feed = document.getElementById('feed-lista'); feed.innerHTML = "";
                snap.forEach(async p => {
                    const d = p.data();
                    feed.innerHTML += `
                        <div class="post-card">
                            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                                <div class="avatar" style="background:${minhaCor}">${d.nome[0]}</div>
                                <b>${d.nome}</b>
                            </div>
                            <p>${d.content}</p>
                            <div style="display:flex; gap:15px; font-size:12px;">
                                <span onclick="toggleLike('${p.id}')" style="cursor:pointer">❤️ ${d.likes || 0}</span>
                                <span onclick="comentar('${p.id}')" style="cursor:pointer">💬 Comentar</span>
                            </div>
                        </div>`;
                });
            });
        }

        // Funções básicas mantidas (Ouvir usuários, Entrar, Sair, etc)
        window.sair = async () => { await updateDoc(doc(db, "usuarios", meuNome), { online: false }); location.reload(); };
        window.mudarAba = (aba) => { document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden')); document.getElementById('aba-' + aba).classList.remove('hidden'); };
        function ouvirUsuarios() {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                const lista = document.getElementById('lista-usuarios'); lista.innerHTML = "";
                snap.forEach(u => {
                    if(u.id !== meuNome) {
                        const d = u.data();
                        lista.innerHTML += `<div class="user-card" data-nome="${u.id}" onclick="abrirChat('${u.id}', '${d.cor}')" style="background:var(--card); padding:12px; margin-bottom:8px; border-radius:10px; display:flex; align-items:center; gap:10px; border:1px solid var(--border); cursor:pointer;">
                            <div class="avatar" style="background:${d.cor || '#333'}">${u.id[0]}</div>
                            <b>${u.id}</b>
                        </div>`;
                    }
                });
            });
        }
        window.enviarPrivado = async () => {
            const input = document.getElementById('msgPrivadaInput');
            if(input.value.trim() && chatAtivoId) {
                const chatId = [meuNome, chatAtivoId].sort().join("_");
                const txt = input.value; input.value = "";
                await addDoc(collection(db, `chats/${chatId}/mensagens`), { de: meuNome, texto: txt, data: Date.now() });
                await setDoc(doc(db, "digitando", chatId), { [meuNome]: false }, { merge: true });
            }
        };
        window.fecharChat = () => document.getElementById('janela-chat').classList.add('hidden');
        async function carregarPerfil() { const d = await getDoc(doc(db, "usuarios", meuNome)); if(d.exists()) { document.getElementById('perf-nome').innerText = "Olá, " + meuNome; document.getElementById('bioInput').value = d.data().bio || ""; } }
        function ouvirChatGeral() { onSnapshot(query(collection(db, "chat_geral"), orderBy("data", "asc")), (s) => { const l = document.getElementById('chat-geral-lista'); l.innerHTML = ""; s.forEach(m => { l.innerHTML += `<div><b>${m.data().nome}:</b> ${m.data().texto}</div>`; }); l.scrollTop = l.scrollHeight; }); }
        window.enviarGeral = () => { const i = document.getElementById('chatGeralInput'); if(i.value) { addDoc(collection(db, "chat_geral"), { nome: meuNome, texto: i.value, data: Date.now() }); i.value = ""; } };
    </script>
</body>
</html>
