<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackNet | Pro V10.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root { --main: #00ff88; --bg: #0d1117; --card: #161b22; --border: #30363d; --text-gray: #8b949e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }

        /* Nav */
        nav { background: var(--card); padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        nav button { background: transparent; border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; position: relative; font-size: 13px; }
        .notif-ponto { width: 10px; height: 10px; background: #ff4444; border-radius: 50%; position: absolute; top: -2px; right: -2px; border: 2px solid var(--card); }

        /* Perfil */
        .tema-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; cursor: pointer; display: inline-block; margin: 5px; }
        .contadores { display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .tag-user { font-size: 10px; background: var(--main); color: black; padding: 2px 6px; border-radius: 5px; margin-left: 5px; font-weight: bold; vertical-align: middle; }
        
        /* Feed & Stories */
        .aba { max-width: 500px; margin: 0 auto; padding: 15px; }
        .stories-wrapper { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid var(--border); }
        .story-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--main); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: black; flex-shrink: 0; cursor: pointer; background: #333; }
        .story-add { border: 2px dashed var(--text-gray); background: transparent; color: var(--text-gray); }
        #story-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        .post-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; }
        .post-img { width: 100%; border-radius: 8px; margin-top: 10px; }
        
        .like-area { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; background: #30363d; padding: 5px 10px; border-radius: 20px; }
        .curtido { color: #ff4444; }
        .acoes-topo { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .btn-acao { background: none; border: none; font-size: 11px; font-weight: bold; cursor: pointer; padding: 0; color: var(--text-gray); }
        .comentario-box { background: #000; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 13px; border: 1px solid var(--border); }

        /* Chat, Respostas e Contatos */
        .user-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .btn-seguir { background: var(--main); color: black; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-seguindo { background: #30363d; color: white; border: 1px solid var(--border); }
        
        .filtros-contatos { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-filtro { flex: 1; padding: 8px; background: var(--card); color: var(--text-gray); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-filtro.ativo { background: var(--main); color: black; border-color: var(--main); }

        #chat-geral-lista, #mensagens-privadas { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 15px; background: #000; border-radius: 10px; margin-bottom: 10px; }
        .msg-container { display: flex; flex-direction: column; max-width: 80%; width: fit-content; }
        .msg-container.other { align-self: flex-start; }
        .msg-container.other .msg { border-radius: 15px 15px 15px 2px; }
        .msg-container.me { align-self: flex-end; }
        .msg-container.me .msg { border-radius: 15px 15px 2px 15px; }
        .msg { padding: 10px 15px; font-size: 14px; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .msg-rodape { font-size: 9px; opacity: 0.6; margin-top: 3px; display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
        
        /* Botões Extras */
        .btn-chat-extra { background: #ff4444; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; }
        .btn-game-icon { background: #0084ff; font-size: 22px; }
        .btn-upload-icon { background: #a333ff; font-size: 20px; }
        .img-chat { max-width: 200px; border-radius: 8px; margin-top: 5px; }

        .velha-board { display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; background: #000; padding: 5px; border-radius: 8px; margin: 10px auto; width: fit-content; }
        .velha-cell { width: 50px; height: 50px; background: var(--card); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; color: white; }

        input, textarea, select { background: #161b22; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }

        /* Chamada WebRTC */
        #tela-chamada { position: fixed; inset: 0; background: #000; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .videos-chamada { position: relative; width: 100%; height: 100%; max-width: 500px; display: flex; flex-direction: column; }
        #video-remoto { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #video-local { width: 120px; height: 160px; position: absolute; bottom: 100px; right: 20px; border: 2px solid var(--main); border-radius: 10px; }
        
        #upload-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth-screen" style="height:100vh; display:flex; justify-content:center; align-items:center;">
        <div style="background:var(--card); padding:30px; border-radius:15px; text-align:center; border:1px solid var(--border); width:280px;">
            <h1>STACK<span>NET</span></h1>
            <input type="text" id="nome-usuario" placeholder="Teu nome...">
            <button onclick="entrar()" style="background:var(--main); border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; color:black;">Entrar</button>
        </div>
    </div>

    <div id="upload-overlay" class="hidden">
        <p>Enviando Arquivo...</p>
        <p style="font-size:30px; animation: pulse 1s infinite;">⏳</p>
    </div>

    <div id="app-screen" class="hidden">
        <nav>
            <button onclick="mudarAba('feed')">🔥 Feed</button>
            <button onclick="mudarAba('chat-geral')">💬 Geral</button>
            <button onclick="mudarAba('users')">👥 Privado <div id="badge-privado" class="notif-ponto hidden"></div></button>
            <button onclick="mudarAba('perfil')">👤 Perfil</button>
            <button onclick="sair()" style="color:#f44">Sair</button>
        </nav>

        <div id="aba-perfil" class="aba hidden">
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center; border:1px solid var(--border);">
                <div class="avatar" id="perf-avatar" style="width:70px; height:70px; margin:0 auto; font-size:28px;"></div>
                <h2 id="perf-nome" style="color:var(--main); margin:10px 0 5px 0;"></h2>
                <div class="contadores">
                    <div><b id="num-seguidores">0</b><br><small style="color:var(--text-gray)">Seguidores</small></div>
                    <div><b id="num-seguindo">0</b><br><small style="color:var(--text-gray)">Seguindo</small></div>
                </div>
                <p style="font-size:14px; margin-bottom:5px;">Sua Cor:</p>
                <div style="margin-bottom:15px;">
                    <div class="tema-btn" style="background:#00ff88" onclick="mudarCor('#00ff88')"></div>
                    <div class="tema-btn" style="background:#0084ff" onclick="mudarCor('#0084ff')"></div>
                    <div class="tema-btn" style="background:#a333ff" onclick="mudarCor('#a333ff')"></div>
                    <div class="tema-btn" style="background:#ff8800" onclick="mudarCor('#ff8800')"></div>
                </div>
                <p style="font-size:14px; margin-bottom:5px;">Seu Título:</p>
                <select id="tagInput">
                    <option value="">Sem Tag</option>
                    <option value="💻 [Dev]">💻 [Dev]</option>
                    <option value="🎮 [Gamer]">🎮 [Gamer]</option>
                    <option value="🎨 [Artista]">🎨 [Artista]</option>
                    <option value="👑 [VIP]">👑 [VIP]</option>
                    <option value="🚀 [Criador]">🚀 [Criador]</option>
                </select>
                <textarea id="bioInput" placeholder="Sua biografia..."></textarea>
                <button onclick="salvarBio()" style="background:var(--main); border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; color:black;">Salvar Perfil</button>
                <button id="btn-instalar" onclick="instalarApp()" class="hidden" style="background:#0084ff; color:white; border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">📲 Instalar StackNet</button>
            </div>
        </div>

        <div id="aba-feed" class="aba">
            <div id="stories-wrapper" class="stories-wrapper">
                <div class="story-circle story-add" onclick="postarStory()">+</div>
                <div id="stories-list" style="display:contents;"></div>
            </div>
            <div style="background:var(--card); padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">
                <textarea id="postInput" placeholder="No que está pensando?"></textarea>
                <div style="display:flex; gap:10px;">
                    <input type="file" id="filePost" accept="image/*" class="hidden" onchange="postarComImagem(event)">
                    <button onclick="document.getElementById('filePost').click()" class="btn-chat-extra btn-upload-icon" style="width: 40px; height: 40px; border-radius: 8px;">📎</button>
                    <button onclick="postar()" style="background:var(--main); border:none; padding:10px; flex:1; border-radius:8px; font-weight:bold; cursor:pointer; color:black;">Publicar</button>
                </div>
            </div>
            <div id="feed-lista"></div>
        </div>

        <div id="aba-chat-geral" class="aba hidden">
            <div id="chat-geral-lista"></div>
            <div id="preview-reply-geral" class="preview-reply hidden">
                <span id="text-reply-geral"></span>
                <button onclick="cancelarResposta('geral')" style="background:none; border:none; color:#f44; cursor:pointer;">X</button>
            </div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chatGeralInput" placeholder="Mensagem para todos..." style="margin:0">
                <button onclick="enviarGeral()" style="background:var(--main); border:none; border-radius:8px; width:80px; font-weight:bold; color:black;">Enviar</button>
            </div>
        </div>

        <div id="aba-users" class="aba hidden">
            <input type="text" id="buscaUsuario" placeholder="🔍 Procurar amigo..." oninput="filtrarUsuarios()">
            <div class="filtros-contatos">
                <button id="btn-meus-contatos" class="btn-filtro ativo" onclick="mudarFiltroContatos('meus')">Meus Contatos</button>
                <button id="btn-explorar-contatos" class="btn-filtro" onclick="mudarFiltroContatos('todos')">Explorar (Todos)</button>
            </div>
            <div id="lista-usuarios"></div>
            
            <div id="janela-chat" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; flex-direction:column;">
                <div style="padding:15px; background:var(--card); display:flex; align-items:center; border-bottom:1px solid var(--border);">
                    <button onclick="fecharChat()" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">⬅</button>
                    <b id="chat-com-nome" style="margin-left:10px;"></b>
                    <div style="flex:1; display:flex; justify-content:flex-end; gap:15px;">
                        <button onclick="iniciarChamada('audio')" style="background:none; border:none; font-size:22px;">📞</button>
                        <button onclick="iniciarChamada('video')" style="background:none; border:none; font-size:22px;">📹</button>
                    </div>
                </div>
                <div id="mensagens-privadas"></div>
                <div id="texto-digitando" style="padding:0 15px; font-size:12px; color:var(--main); height:15px;"></div>
                <div id="preview-reply-privado" class="preview-reply hidden" style="border-radius:0;">
                    <span id="text-reply-privado"></span>
                    <button onclick="cancelarResposta('privado')" style="background:none; border:none; color:#f44;">X</button>
                </div>
                <div style="padding:10px 15px; display:flex; gap:8px; background:var(--card); border-top:1px solid var(--border); align-items: center;">
                    <input type="file" id="fileChat" accept="image/*" class="hidden" onchange="enviarImagemPrivada(event)">
                    <button onclick="document.getElementById('fileChat').click()" class="btn-chat-extra btn-upload-icon">📎</button>
                    <button class="btn-chat-extra btn-game-icon" onclick="enviarJogoVelha()">🎮</button>
                    <input type="text" id="msgPrivadaInput" placeholder="Sua mensagem..." oninput="avisarDigitando()" style="margin:0; flex:1;">
                    <button id="btn-audio" class="btn-chat-extra" onmousedown="iniciarGravacao()" onmouseup="pararGravacao()" ontouchstart="iniciarGravacao()" ontouchend="pararGravacao()">🎤</button>
                    <button onclick="enviarPrivado()" style="background:var(--main); border:none; border-radius:50%; width:45px; height:45px; font-weight:bold; color:black;">➤</button>
                </div>
            </div>
        </div>

        <div id="story-viewer" class="hidden">
            <div style="width: 100%; display: flex; justify-content: space-between; padding: 20px; position: absolute; top: 0; box-sizing: border-box;">
                <button id="btn-del-story" class="hidden" style="background:none; border:none; color:#ff4444; font-size:24px; font-weight:bold;">🗑️</button>
                <button onclick="fecharStory()" style="background:none; border:none; color:white; font-size:30px; font-weight:bold;">✖</button>
            </div>
            <div class="avatar" id="sv-avatar" style="width:80px; height:80px; font-size:35px;"></div>
            <h2 id="sv-nome" style="color:var(--main); margin-top:15px;"></h2>
            <p id="sv-texto" style="font-size:24px; color:white; word-wrap: break-word; max-width:90%;"></p>
        </div>

        <div id="tela-chamada" class="hidden">
            <div id="chamada-info" style="position:absolute; top:60px; text-align:center; width:100%; z-index:10;">
                <h2 id="chamada-nome" style="font-size:28px;"></h2>
                <p id="chamada-status">Chamando...</p>
            </div>
            <video id="video-remoto" autoplay playsinline></video>
            <video id="video-local" autoplay playsinline muted></video>
            <div class="controles-chamada">
                <button id="btn-atender-chamada" class="btn-call btn-atender hidden" onclick="atenderChamada()">📞</button>
                <button class="btn-call btn-desligar" onclick="desligarChamada()">✖</button>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, increment, getDoc, where, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2byHMCCdXKUT5bfBTvcw0zzsIY6uQz88",
            authDomain: "rede-social-8f031.firebaseapp.com",
            databaseURL: "https://rede-social-8f031-default-rtdb.firebaseio.com",
            projectId: "rede-social-8f031",
            storageBucket: "rede-social-8f031.firebasestorage.app",
            messagingSenderId: "439234666870",
            appId: "1:439234666870:web:b8dde1bdd07a247b61da57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app); 

        let meuNome = "", chatAtivoId = "", minhaCor = "#00ff88", minhaTag = "", abaAtiva = "feed", digitandoTimeout;
        let meusSeguindo = []; 
        let replyingToGeral = null, replyingToPrivado = null;
        let mediaRecorder, audioChunks = [];
        let filtroContatoAtual = "meus";

        const formataData = () => { const d = new Date(); return `${d.getDate()}/${d.getMonth()+1} às ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

        // --- CONVERSOR DE IMAGEM PARA BASE64 (PARA NÃO PRECISAR PAGAR STORAGE) ---
        const converterParaBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        window.postarComImagem = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 600000) return alert("Foto muito pesada! Escolha uma menor que 500kb.");
            document.getElementById('upload-overlay').classList.remove('hidden');
            const base64 = await converterParaBase64(file);
            await addDoc(collection(db, "posts"), { 
                nome: meuNome, tag: minhaTag, content: document.getElementById('postInput').value, 
                img: base64, data: Date.now(), dataStr: formataData(), likes: 0, comentarios: [], cor: minhaCor, editado: false 
            });
            document.getElementById('upload-overlay').classList.add('hidden');
            document.getElementById('postInput').value = "";
        };

        window.enviarImagemPrivada = async (event) => {
            const file = event.target.files[0];
            if (!file || !chatAtivoId) return;
            document.getElementById('upload-overlay').classList.remove('hidden');
            const base64 = await converterParaBase64(file);
            const chatId = [meuNome, chatAtivoId].sort().join("_");
            await addDoc(collection(db, `chats/${chatId}/mensagens`), { 
                de: meuNome, texto: "", img: base64, data: Date.now(), dataStr: formataData(), lida: false 
            });
            document.getElementById('upload-overlay').classList.add('hidden');
            await addDoc(collection(db, "notificacoes_chat"), { para: chatAtivoId, de: meuNome, data: Date.now() });
        };

        // --- LÓGICA DE CHAMADAS WEBRTC ---
        const configuracaoRTC = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pcChamada = null, streamLocal = null, streamRemoto = null, chamadaAtualId = null;

        async function abrirCameraAudio(tipo) {
            try {
                const constraints = { audio: true, video: tipo === 'video' };
                streamLocal = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('video-local').srcObject = streamLocal;
                if(tipo === 'audio') document.getElementById('video-local').classList.add('hidden');
                else document.getElementById('video-local').classList.remove('hidden');
            } catch(e) { alert("Permita câmera/microfone!"); }
        }

        window.iniciarChamada = async (tipo) => {
            if(!chatAtivoId) return;
            chamadaAtualId = [meuNome, chatAtivoId].sort().join("_");
            document.getElementById('tela-chamada').classList.remove('hidden');
            document.getElementById('chamada-nome').innerText = chatAtivoId;
            await abrirCameraAudio(tipo);
            pcChamada = new RTCPeerConnection(configuracaoRTC);
            streamRemoto = new MediaStream();
            document.getElementById('video-remoto').srcObject = streamRemoto;
            streamLocal.getTracks().forEach(t => pcChamada.addTrack(t, streamLocal));
            pcChamada.ontrack = e => e.streams[0].getTracks().forEach(t => streamRemoto.addTrack(t));
            const refChamada = doc(db, "chamadas", chamadaAtualId);
            pcChamada.onicecandidate = e => { if(e.candidate) addDoc(collection(refChamada, "callerCandidates"), e.candidate.toJSON()); };
            const offer = await pcChamada.createOffer();
            await pcChamada.setLocalDescription(offer);
            await setDoc(refChamada, { de: meuNome, para: chatAtivoId, tipo: tipo, offer: { type: offer.type, sdp: offer.sdp }, status: "chamando" });
            onSnapshot(refChamada, (d) => {
                if(d.data()?.answer && !pcChamada.currentRemoteDescription) pcChamada.setRemoteDescription(new RTCSessionDescription(d.data().answer));
                if(d.data()?.status === "encerrada") desligarLocal();
            });
        };

        window.atenderChamada = async () => {
            document.getElementById('btn-atender-chamada').classList.add('hidden');
            const refChamada = doc(db, "chamadas", chamadaAtualId);
            const data = (await getDoc(refChamada)).data();
            await abrirCameraAudio(data.tipo);
            pcChamada = new RTCPeerConnection(configuracaoRTC);
            streamRemoto = new MediaStream();
            document.getElementById('video-remoto').srcObject = streamRemoto;
            streamLocal.getTracks().forEach(t => pcChamada.addTrack(t, streamLocal));
            pcChamada.ontrack = e => e.streams[0].getTracks().forEach(t => streamRemoto.addTrack(t));
            pcChamada.onicecandidate = e => { if(e.candidate) addDoc(collection(refChamada, "calleeCandidates"), e.candidate.toJSON()); };
            await pcChamada.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pcChamada.createAnswer();
            await pcChamada.setLocalDescription(answer);
            await updateDoc(refChamada, { answer: { type: answer.type, sdp: answer.sdp }, status: "atendida" });
        };

        window.desligarChamada = async () => {
            if(chamadaAtualId) await updateDoc(doc(db, "chamadas", chamadaAtualId), { status: "encerrada" });
            desligarLocal();
        };

        function desligarLocal() {
            if(pcChamada) pcChamada.close();
            if(streamLocal) streamLocal.getTracks().forEach(t => t.stop());
            document.getElementById('tela-chamada').classList.add('hidden');
        }

        // --- SISTEMA CORE ---
        window.entrar = async () => {
            const nome = document.getElementById('nome-usuario').value.trim();
            if(nome) {
                meuNome = nome;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                await setDoc(doc(db, "usuarios", meuNome), { nome: meuNome, online: true }, { merge: true });
                carregarPerfil(); ouvirUsuarios(); ouvirFeed(); ouvirChatGeral(); escutarNotificacoes(); ouvirStories(); escutarChamadasEntrando();
            }
        };

        function escutarChamadasEntrando() {
            onSnapshot(query(collection(db, "chamadas"), where("para", "==", meuNome)), snap => {
                snap.docChanges().forEach(c => {
                    const d = c.doc.data();
                    if(d.status === "chamando") {
                        chamadaAtualId = c.doc.id;
                        document.getElementById('tela-chamada').classList.remove('hidden');
                        document.getElementById('chamada-nome').innerText = d.de;
                        document.getElementById('chamada-status').innerText = d.tipo === 'video' ? "Vídeo Chamada..." : "Ligação de Áudio...";
                        document.getElementById('btn-atender-chamada').classList.remove('hidden');
                    }
                });
            });
        }

        window.mudarAba = (aba) => {
            abaAtiva = aba;
            if(aba === "users") document.getElementById('badge-privado').classList.add('hidden');
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.getElementById('aba-' + aba).classList.remove('hidden');
        };

        window.mudarFiltroContatos = (tipo) => {
            filtroContatoAtual = tipo;
            document.getElementById('btn-meus-contatos').classList.toggle('ativo', tipo === 'meus');
            document.getElementById('btn-explorar-contatos').classList.toggle('ativo', tipo === 'todos');
            ouvirUsuarios();
        };

        window.toggleSeguir = async (idOutro, event) => {
            event.stopPropagation();
            const ref = doc(db, "usuarios", meuNome);
            if (meusSeguindo.includes(idOutro)) await updateDoc(ref, { seguindo: arrayRemove(idOutro) });
            else await updateDoc(ref, { seguindo: arrayUnion(idOutro) });
        };

        async function carregarPerfil() {
            onSnapshot(doc(db, "usuarios", meuNome), (d) => {
                if(d.exists()) {
                    const data = d.data();
                    meusSeguindo = data.seguindo || [];
                    minhaTag = data.tag || "";
                    minhaCor = data.cor || "#00ff88";
                    document.getElementById('perf-nome').innerText = meuNome;
                    document.getElementById('perf-avatar').innerText = meuNome[0];
                    document.getElementById('perf-avatar').style.background = minhaCor;
                    document.getElementById('num-seguindo').innerText = meusSeguindo.length;
                    document.documentElement.style.setProperty('--main', minhaCor);
                }
            });
            onSnapshot(query(collection(db, "usuarios"), where("seguindo", "array-contains", meuNome)), snap => document.getElementById('num-seguidores').innerText = snap.size);
        }

        function ouvirUsuarios() {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                const lista = document.getElementById('lista-usuarios');
                lista.innerHTML = "";
                snap.forEach(u => {
                    if(u.id === meuNome) return;
                    const d = u.data();
                    const seguindo = meusSeguindo.includes(u.id);
                    if(filtroContatoAtual === "meus" && !seguindo) return;
                    lista.innerHTML += `<div class="user-card" onclick="abrirChat('${u.id}', '${d.cor}')">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="avatar" style="background:${d.cor || '#333'}">${u.id[0]}</div>
                            <b>${u.id} ${d.online ? '🟢' : ''}</b>
                        </div>
                        <button class="btn-seguir ${seguindo ? 'btn-seguindo' : ''}" onclick="toggleSeguir('${u.id}', event)">${seguindo ? 'Remover' : 'Adicionar'}</button>
                    </div>`;
                });
            });
        }

        window.abrirChat = (id, corOutro) => {
            chatAtivoId = id;
            document.getElementById('janela-chat').classList.remove('hidden');
            document.getElementById('chat-com-nome').innerText = id;
            const chatId = [meuNome, id].sort().join("_");
            if(window.unsubChat) window.unsubChat();
            window.unsubChat = onSnapshot(query(collection(db, `chats/${chatId}/mensagens`), orderBy("data")), (snap) => {
                const box = document.getElementById('mensagens-privadas');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.data();
                    const souEu = d.de === meuNome;
                    if(!souEu && !d.lida) updateDoc(doc(db, `chats/${chatId}/mensagens`, m.id), { lida: true });
                    
                    let conteudo = "";
                    if(d.tipo === 'jogo_velha') {
                        conteudo = `<div style="text-align:center;"><b>Jogo da Velha</b><div class="velha-board">`;
                        d.tabuleiro.forEach((c, i) => { conteudo += `<div class="velha-cell" onclick="jogarVelha('${m.id}', ${i}, '${d.turno}', '${d.vencedor}', '${d.tabuleiro.join(',')}')">${c}</div>`; });
                        conteudo += `</div><small>${d.vencedor ? 'Fim de Jogo!' : 'Turno: '+d.turno}</small></div>`;
                    } else if(d.img) {
                        conteudo = `<img src="${d.img}" class="img-chat">`;
                    } else {
                        conteudo = d.audio ? `<audio controls src="${d.audio}"></audio>` : d.texto;
                    }

                    box.innerHTML += `<div class="msg-container ${souEu ? 'me' : 'other'}">
                        <div class="msg" style="background:${souEu ? minhaCor : '#30363d'}; color:${souEu ? 'black' : 'white'}">${conteudo}
                        <div class="msg-rodape">${d.dataStr} ${souEu && d.lida ? '✓✓' : '✓'}</div></div>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.enviarPrivado = async () => {
            const input = document.getElementById('msgPrivadaInput');
            if(!input.value.trim() || !chatAtivoId) return;
            const chatId = [meuNome, chatAtivoId].sort().join("_");
            await addDoc(collection(db, `chats/${chatId}/mensagens`), { de: meuNome, texto: input.value, data: Date.now(), dataStr: formataData(), lida: false });
            input.value = "";
            await addDoc(collection(db, "notificacoes_chat"), { para: chatAtivoId, de: meuNome, data: Date.now() });
        };

        // --- SISTEMAS DE APOIO (STORY, FEED, GERAL) ---
        window.postar = async () => {
            const txt = document.getElementById('postInput').value;
            if(txt.trim()) { 
                await addDoc(collection(db, "posts"), { nome: meuNome, content: txt, data: Date.now(), dataStr: formataData(), likes: 0, cor: minhaCor });
                document.getElementById('postInput').value = ""; 
            }
        };

        function ouvirFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("data", "desc")), snap => {
                const lista = document.getElementById('feed-lista'); lista.innerHTML = "";
                snap.forEach(p => {
                    const d = p.data();
                    lista.innerHTML += `<div class="post-card">
                        <div class="card-header"><div class="avatar" style="background:${d.cor}">${d.nome[0]}</div><b>${d.nome}</b></div>
                        <p>${d.content}</p>
                        ${d.img ? `<img src="${d.img}" class="post-img">` : ""}
                        <div class="like-area" onclick="toggleLike('${p.id}', ${d.likes})">❤️ ${d.likes}</div>
                    </div>`;
                });
            });
        }

        window.toggleLike = async (id, atual) => { await updateDoc(doc(db, "posts", id), { likes: atual + 1 }); };
        window.sair = () => { updateDoc(doc(db, "usuarios", meuNome), { online: false }).then(() => location.reload()); };
        window.fecharChat = () => document.getElementById('janela-chat').classList.add('hidden');
        function ouvirChatGeral() { onSnapshot(query(collection(db, "chat_geral"), orderBy("data")), snap => { /* lógica simples */ }); }
        function escutarNotificacoes() { onSnapshot(query(collection(db, "notificacoes_chat"), where("para", "==", meuNome)), snap => { if(!snap.empty) document.getElementById('badge-privado').classList.remove('hidden'); }); }
        
        // --- FINALIZAÇÃO ---
        window.postarStory = async () => {
            const t = prompt("Status de hoje:");
            if(t) await addDoc(collection(db, "stories"), { nome: meuNome, texto: t, data: Date.now(), cor: minhaCor });
        };
        function ouvirStories() { onSnapshot(collection(db, "stories"), snap => { /* lógica simples */ }); }
        window.salvarBio = () => { alert("Perfil salvo!"); };
        window.mudarCor = (c) => { minhaCor = c; document.documentElement.style.setProperty('--main', c); };
    </script>
</body>
</html>
