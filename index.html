<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackNet | Social</title>
    <style>
        :root { --main: #00ff88; --bg: #0d1117; --card: #161b22; --border: #30363d; --text-gray: #8b949e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }

        /* Login */
        #auth-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 280px; }
        h1 span { color: var(--main); }
        input, textarea { background: #000; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        button { background: var(--main); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Nav */
        nav { background: var(--card); padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        nav button { background: transparent; border: 1px solid var(--border); color: white; width: auto; padding: 5px 10px; font-size: 12px; border-radius: 5px; }

        /* Feed e Cards */
        .aba { max-width: 500px; margin: 0 auto; padding: 15px; }
        .post-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; background: var(--main); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .info b { display: block; font-size: 14px; color: var(--main); }
        .info span { font-size: 11px; color: var(--text-gray); }

        /* Chat */
        #chat-geral-lista, #mensagens-privadas { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding: 10px; }
        .user-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        #janela-chat { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; }
        .chat-top { padding: 15px; background: var(--card); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }
        
        .msg-container { display: flex; flex-direction: column; position: relative; max-width: 80%; }
        .msg { padding: 10px; border-radius: 10px; background: #30363d; font-size: 14px; word-wrap: break-word; position: relative; }
        .me { align-self: flex-end; background: var(--main); color: black; }
        
        /* Botão excluir */
        .btn-del { background: none; border: none; color: #ff4444; font-size: 10px; cursor: pointer; padding: 0; margin-top: 2px; text-align: right; font-weight: bold; }
        .del-post { position: absolute; top: 15px; right: 15px; color: #ff4444; font-size: 12px; cursor: pointer; }

    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1>STACK<span>NET</span></h1>
            <input type="text" id="nome-usuario" placeholder="Teu nome...">
            <button onclick="entrar()">Entrar</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav>
            <button onclick="mudarAba('feed')">🔥 Feed</button>
            <button onclick="mudarAba('chat-geral')">💬 Geral</button>
            <button onclick="mudarAba('users')">👥 Privado</button>
            <button onclick="location.reload()" style="color: #f44; border-color: #f44;">Sair</button>
        </nav>

        <div id="aba-feed" class="aba">
            <textarea id="postInput" placeholder="O que está acontecendo?"></textarea>
            <button onclick="postar()">Publicar Post</button>
            <div id="feed-lista" style="margin-top: 20px;"></div>
        </div>

        <div id="aba-chat-geral" class="aba hidden">
            <h3>Chat Geral</h3>
            <div id="chat-geral-lista"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="chatGeralInput" placeholder="Mensagem..." style="margin:0">
                <button onclick="enviarGeral()" style="width: 80px;">Enviar</button>
            </div>
        </div>

        <div id="aba-users" class="aba hidden">
            <h3>Pessoas</h3>
            <div id="lista-usuarios"></div>
            
            <div id="janela-chat" class="hidden">
                <div class="chat-top">
                    <button onclick="fecharChat()" style="width: auto; padding: 5px 12px; background:#333; color:white; border:none; border-radius:5px;">⬅ Voltar</button>
                    <b id="chat-com-nome"></b>
                </div>
                <div id="mensagens-privadas"></div>
                <div style="padding: 15px; display: flex; gap: 8px; background: var(--card); border-top: 1px solid var(--border);">
                    <input type="text" id="msgPrivadaInput" placeholder="Mensagem..." style="margin:0">
                    <button onclick="enviarPrivado()" style="width: 60px;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2byHMCCdXKUT5bfBTvcw0zzsIY6uQz88",
            authDomain: "rede-social-8f031.firebaseapp.com",
            databaseURL: "https://rede-social-8f031-default-rtdb.firebaseio.com",
            projectId: "rede-social-8f031",
            storageBucket: "rede-social-8f031.firebasestorage.app",
            messagingSenderId: "439234666870",
            appId: "1:439234666870:web:b8dde1bdd07a247b61da57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNome = "";
        let chatAtivoId = "";
        let unsubChat = null;

        const formataData = () => {
            const d = new Date();
            return `${d.getDate()}/${d.getMonth()+1} às ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        };

        window.entrar = async () => {
            const nome = document.getElementById('nome-usuario').value.trim();
            if(nome) {
                meuNome = nome;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                await setDoc(doc(db, "usuarios", meuNome), { nome: meuNome });
                ouvirUsuarios();
                ouvirFeed();
                ouvirChatGeral();
            }
        };

        window.mudarAba = (aba) => {
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.getElementById('aba-' + aba).classList.remove('hidden');
        };

        // --- FUNÇÃO PARA EXCLUIR ---
        window.excluirMsg = async (caminho, id) => {
            if(confirm("Deseja excluir esta mensagem?")) {
                await deleteDoc(doc(db, caminho, id));
            }
        };

        // --- FEED ---
        window.postar = () => {
            const txt = document.getElementById('postInput').value;
            if(txt.trim()) {
                addDoc(collection(db, "posts"), { nome: meuNome, content: txt, data: Date.now(), dataStr: formataData() });
                document.getElementById('postInput').value = "";
            }
        };

        function ouvirFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("data", "desc")), (snap) => {
                const feed = document.getElementById('feed-lista');
                feed.innerHTML = "";
                snap.forEach(p => {
                    const d = p.data();
                    const id = p.id;
                    const btnDel = d.nome === meuNome ? `<span class="del-post" onclick="excluirMsg('posts', '${id}')">Excluir</span>` : "";
                    feed.innerHTML += `
                        <div class="post-card">
                            ${btnDel}
                            <div class="card-header">
                                <div class="avatar">${d.nome[0]}</div>
                                <div class="info"><b>${d.nome}</b><span>${d.dataStr || ""}</span></div>
                            </div>
                            <div style="line-height:1.4">${d.content}</div>
                        </div>`;
                });
            });
        }

        // --- CHAT GERAL ---
        window.enviarGeral = () => {
            const txt = document.getElementById('chatGeralInput').value;
            if(txt.trim()) {
                addDoc(collection(db, "chat_geral"), { nome: meuNome, texto: txt, data: Date.now(), dataStr: formataData() });
                document.getElementById('chatGeralInput').value = "";
            }
        };

        function ouvirChatGeral() {
            onSnapshot(query(collection(db, "chat_geral"), orderBy("data", "asc")), (snap) => {
                const lista = document.getElementById('chat-geral-lista');
                lista.innerHTML = "";
                snap.forEach(m => {
                    const d = m.data();
                    const id = m.id;
                    const btnDel = d.nome === meuNome ? `<button class="btn-del" onclick="excluirMsg('chat_geral', '${id}')">Excluir</button>` : "";
                    lista.innerHTML += `
                        <div class="msg-container ${d.nome === meuNome ? 'me' : ''}">
                            <div class="msg ${d.nome === meuNome ? 'me' : ''}">
                                <b style="color:${d.nome === meuNome ? 'black' : 'var(--main)'}; font-size:10px;">${d.nome} • ${d.dataStr || ""}</b>
                                <div style="font-size:14px; margin-top:2px;">${d.texto}</div>
                            </div>
                            ${btnDel}
                        </div>`;
                });
                lista.scrollTop = lista.scrollHeight;
            });
        }

        // --- CHAT PRIVADO ---
        function ouvirUsuarios() {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                const lista = document.getElementById('lista-usuarios');
                lista.innerHTML = "";
                snap.forEach(u => {
                    if(u.id !== meuNome) {
                        lista.innerHTML += `<div class="user-card" onclick="abrirChat('${u.id}')"><div class="avatar">${u.id[0]}</div><b>${u.id}</b></div>`;
                    }
                });
            });
        }

        window.abrirChat = (id) => {
            chatAtivoId = id;
            document.getElementById('janela-chat').classList.remove('hidden');
            document.getElementById('chat-com-nome').innerText = id;
            const chatId = [meuNome, id].sort().join("_");
            const caminhoPrivado = `chats/${chatId}/mensagens`;
            
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(query(collection(db, caminhoPrivado), orderBy("data")), (snap) => {
                const box = document.getElementById('mensagens-privadas');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.data();
                    const msgId = m.id;
                    const btnDel = d.de === meuNome ? `<button class="btn-del" onclick="excluirMsg('${caminhoPrivado}', '${msgId}')">Excluir</button>` : "";
                    box.innerHTML += `
                        <div class="msg-container ${d.de === meuNome ? 'me' : ''}">
                            <div class="msg ${d.de === meuNome ? 'me' : ''}">${d.texto}</div>
                            ${btnDel}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.enviarPrivado = () => {
            const input = document.getElementById('msgPrivadaInput');
            if(input.value.trim() && chatAtivoId) {
                const chatId = [meuNome, chatAtivoId].sort().join("_");
                addDoc(collection(db, "chats", chatId, "mensagens"), { de: meuNome, texto: input.value, data: Date.now() });
                input.value = "";
            }
        };

        window.fecharChat = () => document.getElementById('janela-chat').classList.add('hidden');
    </script>
</body>
</html>
