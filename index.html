<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackNet | Pro V9.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root { --main: #00ff88; --bg: #0d1117; --card: #161b22; --border: #30363d; --text-gray: #8b949e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }

        /* Nav */
        nav { background: var(--card); padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        nav button { background: transparent; border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; position: relative; font-size: 13px; }
        .notif-ponto { width: 10px; height: 10px; background: #ff4444; border-radius: 50%; position: absolute; top: -2px; right: -2px; border: 2px solid var(--card); }

        /* Perfil */
        .tema-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; cursor: pointer; display: inline-block; margin: 5px; }
        .contadores { display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        /* Nova Tag do Usuário */
        .tag-user { font-size: 10px; background: var(--main); color: black; padding: 2px 6px; border-radius: 5px; margin-left: 5px; font-weight: bold; vertical-align: middle; }
        
        /* Feed & Stories */
        .aba { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        .stories-wrapper { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid var(--border); }
        .story-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--main); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: black; flex-shrink: 0; cursor: pointer; background: #333; }
        .story-add { border: 2px dashed var(--text-gray); background: transparent; color: var(--text-gray); }
        
        #story-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        .post-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; }
        .post-img { width: 100%; border-radius: 8px; margin-top: 10px; }
        
        .like-area { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; background: #30363d; padding: 5px 10px; border-radius: 20px; }
        .curtido { color: #ff4444; }
        .acoes-topo { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .btn-acao { background: none; border: none; font-size: 11px; font-weight: bold; cursor: pointer; padding: 0; color: var(--text-gray); }
        .btn-acao:hover { color: white; }

        .comentario-box { background: #000; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 13px; border: 1px solid var(--border); }

        /* Chat e Respostas */
        .user-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .btn-seguir { background: var(--main); color: black; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-seguindo { background: #30363d; color: white; border: 1px solid var(--border); }
        
        #chat-geral-lista, #mensagens-privadas { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 15px; background: #000; border-radius: 10px; margin-bottom: 10px; }
        
        .msg-container { display: flex; flex-direction: column; max-width: 80%; width: fit-content; }
        .msg-container.other { align-self: flex-start; }
        .msg-container.other .msg { border-radius: 15px 15px 15px 2px; }
        .msg-container.me { align-self: flex-end; }
        .msg-container.me .msg { border-radius: 15px 15px 2px 15px; }
        .msg { padding: 10px 15px; font-size: 14px; word-wrap: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .msg-rodape { font-size: 9px; opacity: 0.6; margin-top: 3px; display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
        
        /* Botão Mic e Jogo */
        .btn-chat-extra { background: #ff4444; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; }
        .btn-game-icon { background: #0084ff; font-size: 22px; }
        .btn-chat-extra.recording { transform: scale(1.2); box-shadow: 0 0 15px #ff4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        audio { max-width: 200px; height: 35px; margin-top: 5px; }

        /* Estilo do Jogo da Velha no Chat */
        .velha-board { display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; background: #000; padding: 5px; border-radius: 8px; margin: 10px auto; width: fit-content; border: 1px solid var(--border); }
        .velha-cell { width: 50px; height: 50px; background: var(--card); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; color: white; }

        /* Sistema de Reply (Citação) */
        .reply-box { background: rgba(0,0,0,0.15); border-left: 3px solid rgba(255,255,255,0.5); padding: 5px 8px; font-size: 12px; margin-bottom: 5px; border-radius: 4px; }
        .preview-reply { background: var(--card); padding: 8px 12px; border-radius: 8px 8px 0 0; font-size: 12px; display: flex; justify-content: space-between; border: 1px solid var(--border); border-bottom: none; align-items: center; }

        input, textarea, select { background: #161b22; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }

        /* NOVO: Tela de Chamada WebRTC */
        #tela-chamada { position: fixed; inset: 0; background: #000; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .videos-chamada { position: relative; width: 100%; height: 100%; max-width: 500px; display: flex; flex-direction: column; }
        #video-remoto { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #video-local { width: 120px; height: 160px; position: absolute; bottom: 100px; right: 20px; object-fit: cover; border-radius: 10px; border: 2px solid var(--main); background: #222; }
        .controles-chamada { position: absolute; bottom: 30px; display: flex; gap: 30px; width: 100%; justify-content: center; }
        .btn-call { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .btn-desligar { background: #ff4444; color: white; }
        .btn-atender { background: #00ff88; color: black; animation: pulse 1s infinite; }
        #chamada-info { position: absolute; top: 60px; text-align: center; width: 100%; text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 10; }
    </style>
</head>
<body>

    <div id="auth-screen" style="height:100vh; display:flex; justify-content:center; align-items:center;">
        <div style="background:var(--card); padding:30px; border-radius:15px; text-align:center; border:1px solid var(--border); width:280px;">
            <h1>STACK<span>NET</span></h1>
            <input type="text" id="nome-usuario" placeholder="Teu nome...">
            <button onclick="entrar()" style="background:var(--main); border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">Entrar</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav>
            <button onclick="mudarAba('feed')">🔥 Feed</button>
            <button onclick="mudarAba('chat-geral')">💬 Geral</button>
            <button onclick="mudarAba('users')">👥 Privado <div id="badge-privado" class="notif-ponto hidden"></div></button>
            <button onclick="mudarAba('perfil')">👤 Perfil</button>
            <button onclick="sair()" style="color:#f44">Sair</button>
        </nav>

        <div id="aba-perfil" class="aba hidden">
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center; border:1px solid var(--border);">
                <div class="avatar" id="perf-avatar" style="width:70px; height:70px; margin:0 auto; font-size:28px;"></div>
                <h2 id="perf-nome" style="color:var(--main); margin:10px 0 5px 0;"></h2>
                
                <div class="contadores">
                    <div><b id="num-seguidores" style="font-size:18px;">0</b><br><small style="color:var(--text-gray)">Seguidores</small></div>
                    <div><b id="num-seguindo" style="font-size:18px;">0</b><br><small style="color:var(--text-gray)">Seguindo</small></div>
                </div>

                <p style="font-size:14px; margin-bottom:5px;">Escolha sua cor:</p>
                <div style="margin-bottom:15px;">
                    <div class="tema-btn" style="background:#00ff88" onclick="mudarCor('#00ff88')"></div>
                    <div class="tema-btn" style="background:#0084ff" onclick="mudarCor('#0084ff')"></div>
                    <div class="tema-btn" style="background:#a333ff" onclick="mudarCor('#a333ff')"></div>
                    <div class="tema-btn" style="background:#ff8800" onclick="mudarCor('#ff8800')"></div>
                </div>
                
                <p style="font-size:14px; margin-bottom:5px;">Escolha sua Tag de Título:</p>
                <select id="tagInput">
                    <option value="">Sem Tag</option>
                    <option value="💻 [Dev]">💻 [Dev]</option>
                    <option value="🎮 [Gamer]">🎮 [Gamer]</option>
                    <option value="🎨 [Artista]">🎨 [Artista]</option>
                    <option value="👑 [VIP]">👑 [VIP]</option>
                    <option value="🚀 [Criador]">🚀 [Criador]</option>
                </select>

                <textarea id="bioInput" placeholder="Sua biografia..."></textarea>
                <button onclick="salvarBio()" style="background:var(--main); border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">Salvar Perfil</button>
                
                <button id="btn-instalar" onclick="instalarApp()" class="hidden" style="background:#0084ff; color:white; border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">📲 Instalar StackNet</button>
            </div>
        </div>

        <div id="aba-feed" class="aba">
            <div id="stories-wrapper" class="stories-wrapper">
                <div class="story-circle story-add" onclick="postarStory()">+</div>
                <div id="stories-list" style="display:contents;"></div>
            </div>

            <div style="background:var(--card); padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">
                <textarea id="postInput" placeholder="O que há de novo? (Cole um link de imagem!)" style="margin-bottom:10px;"></textarea>
                <button onclick="postar()" style="background:var(--main); border:none; padding:10px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">Publicar</button>
            </div>
            <div id="feed-lista"></div>
        </div>

        <div id="aba-chat-geral" class="aba hidden">
            <div id="chat-geral-lista"></div>
            
            <div id="preview-reply-geral" class="preview-reply hidden">
                <span id="text-reply-geral" style="opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%;"></span>
                <button onclick="cancelarResposta('geral')" style="background:none; border:none; color:#f44; cursor:pointer; font-weight:bold;">X</button>
            </div>
            
            <div style="display:flex; gap:8px;">
                <input type="text" id="chatGeralInput" placeholder="Mensagem para todos..." style="margin:0">
                <button onclick="enviarGeral()" style="background:var(--main); border:none; border-radius:8px; width:80px; font-weight:bold;">Enviar</button>
            </div>
        </div>

        <div id="aba-users" class="aba hidden">
            <input type="text" id="buscaUsuario" placeholder="🔍 Procurar amigo..." oninput="filtrarUsuarios()">
            <div id="lista-usuarios"></div>
            
            <div id="janela-chat" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; flex-direction:column;">
                <div style="padding:15px; background:var(--card); display:flex; gap:10px; align-items:center; border-bottom:1px solid var(--border);">
                    <button onclick="fecharChat()" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">⬅</button>
                    <b id="chat-com-nome" style="font-size:16px;"></b>
                    
                    <div style="flex:1; display:flex; justify-content:flex-end; gap:15px;">
                        <button onclick="iniciarChamada('audio')" style="background:none; border:none; font-size:22px; cursor:pointer;">📞</button>
                        <button onclick="iniciarChamada('video')" style="background:none; border:none; font-size:22px; cursor:pointer;">📹</button>
                    </div>
                </div>
                <div id="mensagens-privadas"></div>
                <div id="texto-digitando" class="status-digitando"></div>
                
                <div id="preview-reply-privado" class="preview-reply hidden" style="border-radius:0;">
                    <span id="text-reply-privado" style="opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%;"></span>
                    <button onclick="cancelarResposta('privado')" style="background:none; border:none; color:#f44; cursor:pointer; font-weight:bold;">X</button>
                </div>
                
                <div style="padding:15px; display:flex; gap:8px; background:var(--card); border-top:1px solid var(--border); align-items: center;">
                    <input type="text" id="msgPrivadaInput" placeholder="Sua mensagem..." oninput="avisarDigitando()" style="margin:0; flex: 1;">
                    <button class="btn-chat-extra btn-game-icon" onclick="enviarJogoVelha()">🎮</button>
                    <button id="btn-audio" class="btn-chat-extra" onmousedown="iniciarGravacao()" onmouseup="pararGravacao()" ontouchstart="iniciarGravacao()" ontouchend="pararGravacao()">🎤</button>
                    <button onclick="enviarPrivado()" style="background:var(--main); border:none; border-radius:50%; width:45px; height: 45px; cursor:pointer; font-weight:bold; flex-shrink: 0;">➤</button>
                </div>
            </div>
        </div>

        <div id="story-viewer" class="hidden">
            <div style="width: 100%; display: flex; justify-content: space-between; padding: 20px; position: absolute; top: 0; box-sizing: border-box;">
                <button id="btn-del-story" class="hidden" style="background:none; border:none; color:#ff4444; font-size:24px; cursor:pointer; font-weight:bold;">🗑️</button>
                <button onclick="fecharStory()" style="background:none; border:none; color:white; font-size:30px; cursor:pointer; font-weight:bold;">✖</button>
            </div>
            <div class="avatar" id="sv-avatar" style="width:80px; height:80px; font-size:35px; margin-bottom:20px;"></div>
            <h2 id="sv-nome" style="color:var(--main); margin-bottom:15px;"></h2>
            <p id="sv-texto" style="font-size:24px; line-height:1.4; color:white; word-wrap: break-word; max-width: 90%;"></p>
            <span id="sv-data" style="color:var(--text-gray); font-size:14px; margin-top:20px;"></span>
        </div>

        <div id="tela-chamada" class="hidden">
            <div id="chamada-info">
                <h2 id="chamada-nome" style="margin:0; font-size:28px;">Amigo</h2>
                <p id="chamada-status" style="color:var(--main); font-size:16px;">Chamando...</p>
            </div>
            <div class="videos-chamada">
                <video id="video-remoto" autoplay playsinline></video>
                <video id="video-local" autoplay playsinline muted></video>
                <div class="controles-chamada">
                    <button id="btn-atender-chamada" class="btn-call btn-atender hidden" onclick="atenderChamada()">📞</button>
                    <button class="btn-call btn-desligar" onclick="desligarChamada()">✖</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, increment, getDoc, where, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2byHMCCdXKUT5bfBTvcw0zzsIY6uQz88",
            authDomain: "rede-social-8f031.firebaseapp.com",
            databaseURL: "https://rede-social-8f031-default-rtdb.firebaseio.com",
            projectId: "rede-social-8f031",
            storageBucket: "rede-social-8f031.firebasestorage.app",
            messagingSenderId: "439234666870",
            appId: "1:439234666870:web:b8dde1bdd07a247b61da57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNome = "", chatAtivoId = "", minhaCor = "#00ff88", minhaTag = "", abaAtiva = "feed", digitandoTimeout;
        let meusSeguindo = []; 
        let replyingToGeral = null;
        let replyingToPrivado = null;
        let mediaRecorder, audioChunks = [];
        
        // --- NOVO: Som de chamada e loop ---
        const toqueChamada = new Audio("https://actions.google.com/sounds/v1/alarms/phone_ringing.ogg");
        toqueChamada.loop = true;

        // --- NOVO: Pedir permissão para push ---
        window.pedirPermissaoNotificacao = async () => {
            if ("Notification" in window) {
                const p = await Notification.requestPermission();
                if(p === "granted") console.log("Notificações ativadas!");
            }
        };

        const formataData = () => { const d = new Date(); return `${d.getDate()}/${d.getMonth()+1} às ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

        // --- LÓGICA DE CHAMADAS (WEBRTC) ---
        const configuracaoRTC = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pcChamada = null, streamLocal = null, streamRemoto = null, chamadaAtualId = null;

        async function abrirCameraAudio(tipo) {
            try {
                const constraints = { audio: true, video: tipo === 'video' };
                streamLocal = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('video-local').srcObject = streamLocal;
                if(tipo === 'audio') document.getElementById('video-local').classList.add('hidden');
                else document.getElementById('video-local').classList.remove('hidden');
            } catch(e) { alert("Permita a câmera/microfone para ligar!"); }
        }

        window.iniciarChamada = async (tipo) => {
            if(!chatAtivoId) return;
            chamadaAtualId = [meuNome, chatAtivoId].sort().join("_");
            
            document.getElementById('tela-chamada').classList.remove('hidden');
            document.getElementById('chamada-nome').innerText = chatAtivoId;
            document.getElementById('chamada-status').innerText = "Chamando...";
            document.getElementById('btn-atender-chamada').classList.add('hidden');

            await abrirCameraAudio(tipo);
            
            pcChamada = new RTCPeerConnection(configuracaoRTC);
            streamRemoto = new MediaStream();
            document.getElementById('video-remoto').srcObject = streamRemoto;

            streamLocal.getTracks().forEach(t => pcChamada.addTrack(t, streamLocal));
            pcChamada.ontrack = e => { e.streams[0].getTracks().forEach(t => streamRemoto.addTrack(t)); };

            const refChamada = doc(db, "chamadas", chamadaAtualId);
            const candCaller = collection(refChamada, "callerCandidates");
            const candCallee = collection(refChamada, "calleeCandidates");

            pcChamada.onicecandidate = e => { if(e.candidate) addDoc(candCaller, e.candidate.toJSON()); };

            const offer = await pcChamada.createOffer();
            await pcChamada.setLocalDescription(offer);
            
            await setDoc(refChamada, { de: meuNome, para: chatAtivoId, tipo: tipo, offer: { type: offer.type, sdp: offer.sdp }, status: "chamando" });

            window.unsubChamada = onSnapshot(refChamada, (d) => {
                const data = d.data();
                if(data && (data.status === "rejeitada" || data.status === "encerrada")) desligarLocal();
                if(data && data.answer && !pcChamada.currentRemoteDescription) {
                    pcChamada.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('chamada-status').innerText = "Conectado";
                }
            });

            window.unsubCand = onSnapshot(candCallee, snap => {
                snap.docChanges().forEach(c => { if(c.type === "added") pcChamada.addIceCandidate(new RTCIceCandidate(c.doc.data())); });
            });
        };

        // --- SISTEMA DE NOTIFICAÇÃO PUSH ADICIONADO AQUI ---
        const toqueChamada = new Audio("https://actions.google.com/sounds/v1/alarms/phone_ringing.ogg");
        toqueChamada.loop = true;

        window.pedirPermissaoNotificacao = async () => {
            if ("Notification" in window) {
                const p = await Notification.requestPermission();
                if(p === "granted") console.log("Notificações ativadas!");
            }
        };

        function escutarChamadas() {
            onSnapshot(query(collection(db, "chamadas"), where("para", "==", meuNome)), snap => {
                snap.docChanges().forEach(c => {
                    if(c.type === "added" || c.type === "modified") {
                        const data = c.doc.data();
                        if(data.status === "chamando") {
                            chamadaAtualId = c.doc.id;
                            document.getElementById('tela-chamada').classList.remove('hidden');
                            document.getElementById('chamada-nome').innerText = data.de;
                            document.getElementById('chamada-status').innerText = data.tipo === 'video' ? "Recebendo chamada de vídeo..." : "Recebendo chamada de voz...";
                            document.getElementById('btn-atender-chamada').classList.remove('hidden');
                            
                            toqueChamada.play().catch(e => console.log("Erro no som:", e));
                            
                            if (Notification.permission === "granted") {
                                navigator.serviceWorker.ready.then(reg => {
                                    reg.showNotification(`📞 Nova Chamada de ${data.de}`, {
                                        body: "Clique aqui para atender na StackNet!",
                                        vibrate: [200, 100, 200, 100, 200, 100, 200], 
                                        requireInteraction: true 
                                    });
                                }).catch(() => {
                                    new Notification(`📞 Chamada de ${data.de}`, { body: "Abra o app para atender!", requireInteraction: true });
                                });
                            }
                        } else if (data.status === "encerrada" || data.status === "atendida" || data.status === "rejeitada") {
                            toqueChamada.pause();
                            toqueChamada.currentTime = 0;
                            desligarLocal();
                        }
                    }
                });
            });
        }

        window.atenderChamada = async () => {
            toqueChamada.pause();
            toqueChamada.currentTime = 0;
            document.getElementById('btn-atender-chamada').classList.add('hidden');
            document.getElementById('chamada-status').innerText = "Conectando...";
            
            const refChamada = doc(db, "chamadas", chamadaAtualId);
            const dataDoc = await getDoc(refChamada);
            const data = dataDoc.data();
            
            await abrirCameraAudio(data.tipo);
            
            pcChamada = new RTCPeerConnection(configuracaoRTC);
            streamRemoto = new MediaStream();
            document.getElementById('video-remoto').srcObject = streamRemoto;

            streamLocal.getTracks().forEach(t => pcChamada.addTrack(t, streamLocal));
            pcChamada.ontrack = e => { e.streams[0].getTracks().forEach(t => streamRemoto.addTrack(t)); };

            const candCaller = collection(refChamada, "callerCandidates");
            const candCallee = collection(refChamada, "calleeCandidates");

            pcChamada.onicecandidate = e => { if(e.candidate) addDoc(candCallee, e.candidate.toJSON()); };

            await pcChamada.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pcChamada.createAnswer();
            await pcChamada.setLocalDescription(answer);

            await updateDoc(refChamada, { answer: { type: answer.type, sdp: answer.sdp }, status: "atendida" });
            document.getElementById('chamada-status').innerText = "Conectado";

            window.unsubCand = onSnapshot(candCaller, snap => {
                snap.docChanges().forEach(c => { if(c.type === "added") pcChamada.addIceCandidate(new RTCIceCandidate(c.doc.data())); });
            });
            window.unsubChamada = onSnapshot(refChamada, (d) => { if(d.data() && d.data().status === "encerrada") desligarLocal(); });
        };

        window.desligarChamada = async () => {
            toqueChamada.pause();
            toqueChamada.currentTime = 0;

        window.iniciarGravacao = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result;
                        if(base64Audio.length > 900000) return alert("Áudio muito longo!");
                        enviarMensagemAudio(base64Audio);
                    };
                };
                mediaRecorder.start();
                document.getElementById('btn-audio').classList.add('recording');
            } catch (err) { alert("Permita o microfone para gravar áudio."); }
        };

        window.jogarVelha = async (msgId, index, turnoAtual, vencedor, tabStr) => {
            if (vencedor !== 'null' || turnoAtual !== meuNome) return;
            let tab = tabStr.split(',');
            if (tab[index] !== '') return; 

            let espacosVazios = tab.filter(c => c === '').length;
            let simbolo = espacosVazios % 2 !== 0 ? 'X' : 'O';
            tab[index] = simbolo;

            let novoVencedor = null;
            const linhas = [ [0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6] ];
            
            for (let l of linhas) {
                if (tab[l[0]] && tab[l[0]] === tab[l[1]] && tab[l[0]] === tab[l[2]]) {
                    novoVencedor = meuNome;
                    break;
                }
            }
            if (!novoVencedor && !tab.includes('')) novoVencedor = 'Empate';

            const proximoTurno = chatAtivoId;
            const chatId = [meuNome, chatAtivoId].sort().join("_");
            
            await updateDoc(doc(db, `chats/${chatId}/mensagens`, msgId), {
                tabuleiro: tab,
                turno: novoVencedor ? null : proximoTurno,
                vencedor: novoVencedor
            });
        };

                const chatId = [meuNome, chatAtivoId].sort().join("_");
                const txt = input.value; input.value = "";
                await addDoc(collection(db, `chats/${chatId}/mensagens`), { de: meuNome, tag: minhaTag, texto: txt, data: Date.now(), dataStr: formataData(), lida: false, editado: false, replyTo: replyingToPrivado });
                await setDoc(doc(db, "digitando", chatId), { [meuNome]: false }, { merge: true });
                await addDoc(collection(db, "notificacoes_chat"), { para: chatAtivoId, de: meuNome, data: Date.now() });
                cancelarResposta('privado');
            }
        };

        window.avisarDigitando = async () => { if(!chatAtivoId) return; const chatId = [meuNome, chatAtivoId].sort().join("_"); await setDoc(doc(db, "digitando", chatId), { [meuNome]: true }, { merge: true }); clearTimeout(digitandoTimeout); digitandoTimeout = setTimeout(async () => { await setDoc(doc(db, "digitando", chatId), { [meuNome]: false }, { merge: true }); }, 2000); };
        window.fecharChat = () => { document.getElementById('janela-chat').classList.add('hidden'); cancelarResposta('privado'); };
        function escutarNotificacoes() { onSnapshot(query(collection(db, "notificacoes_chat"), where("para", "==", meuNome)), (snap) => { if(!snap.empty && abaAtiva !== "users") document.getElementById('badge-privado').classList.remove('hidden'); }); }
    </script>
</body>
</html>
