<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SulaqueNet | Simples</title>
    <style>
        :root { --main: #00ff88; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }

        /* Tela de Entrada */
        #auth-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        input, textarea { background: #000; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: var(--main); color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Nav */
        nav { background: var(--card); padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
        nav button { background: transparent; border: 1px solid var(--border); color: white; width: auto; padding: 5px 15px; }

        /* Feed e Chat */
        .aba { max-width: 600px; margin: 0 auto; padding: 15px; }
        .post-card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; }
        .post-card b { color: var(--main); }

        .user-card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); }
        
        #janela-chat { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; }
        #mensagens-privadas { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 10px; background: #30363d; max-width: 80%; }
        .me { align-self: flex-end; background: var(--main); color: black; }
        .chat-input-area { padding: 15px; background: var(--card); display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1>Stack<span>Net</span></h1>
            <input type="text" id="nome-usuario" placeholder="Teu nome ou apelido...">
            <button onclick="entrar()">Entrar no App</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav>
            <button onclick="mudarAba('feed')"> Feed</button>
            <button onclick="mudarAba('users')"> Chat</button>
            <button onclick="location.reload()" style="color: #f44;">Sair</button>
        </nav>

        <div id="aba-feed" class="aba">
            <textarea id="postInput" placeholder="Oque está acontecendo?"></textarea>
            <button onclick="postar()">Postar</button>
            <div id="feed-lista" style="margin-top: 20px;"></div>
        </div>

        <div id="aba-users" class="aba hidden">
            <h3>Pessoas Online</h3>
            <div id="lista-usuarios"></div>
            
            <div id="janela-chat" class="hidden">
                <div style="padding:15px; background:var(--card); display:flex; gap:10px; align-items:center;">
                    <button onclick="fecharChat()" style="width:40px;">⬅</button>
                    <b id="chat-com-nome"></b>
                </div>
                <div id="mensagens-privadas"></div>
                <div class="chat-input-area">
                    <input type="text" id="msgPrivadaInput" placeholder="Mensagem...">
                    <button onclick="enviarPrivado()" style="width:60px;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2byHMCCdXKUT5bfBTvcw0zzsIY6uQz88",
            authDomain: "rede-social-8f031.firebaseapp.com",
            databaseURL: "https://rede-social-8f031-default-rtdb.firebaseio.com",
            projectId: "rede-social-8f031",
            storageBucket: "rede-social-8f031.firebasestorage.app",
            messagingSenderId: "439234666870",
            appId: "1:439234666870:web:b8dde1bdd07a247b61da57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNome = "";
        let chatAtivoId = "";
        let unsubChat = null;

        // --- ENTRAR ---
        window.entrar = async () => {
            const nome = document.getElementById('nome-usuario').value.trim();
            if(nome) {
                meuNome = nome;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                
                // Salva o nome no banco para outros verem
                await setDoc(doc(db, "usuarios", meuNome), { nome: meuNome });
                carregarUsuarios();
                ouvirFeed();
            }
        };

        window.mudarAba = (aba) => {
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.getElementById('aba-' + aba).classList.remove('hidden');
        };

        // --- LISTA DE USUÁRIOS ---
        async function carregarUsuarios() {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                const lista = document.getElementById('lista-usuarios');
                lista.innerHTML = "";
                snap.forEach(u => {
                    if(u.id !== meuNome) {
                        const d = document.createElement('div');
                        d.className = "user-card";
                        d.innerText = "👤 " + u.data().nome;
                        d.onclick = () => abrirChat(u.id);
                        lista.appendChild(d);
                    }
                });
            });
        }

        // --- CHAT PRIVADO ---
        window.abrirChat = (id) => {
            chatAtivoId = id;
            document.getElementById('janela-chat').classList.remove('hidden');
            document.getElementById('chat-com-nome').innerText = id;
            const chatId = [meuNome, id].sort().join("_");
            
            if(unsubChat) unsubChat();
            unsubChat = onSnapshot(query(collection(db, "chats", chatId, "mensagens"), orderBy("data")), (snap) => {
                const box = document.getElementById('mensagens-privadas');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.data();
                    box.innerHTML += `<div class="msg ${d.de === meuNome ? 'me' : ''}">${d.texto}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.enviarPrivado = async () => {
            const input = document.getElementById('msgPrivadaInput');
            if(input.value && chatAtivoId) {
                const chatId = [meuNome, chatAtivoId].sort().join("_");
                await addDoc(collection(db, "chats", chatId, "mensagens"), { de: meuNome, texto: input.value, data: Date.now() });
                input.value = "";
            }
        };

        window.fecharChat = () => document.getElementById('janela-chat').classList.add('hidden');

        // --- FEED ---
        window.postar = async () => {
            const txt = document.getElementById('postInput').value;
            if(txt) {
                await addDoc(collection(db, "posts"), { nome: meuNome, content: txt, data: Date.now() });
                document.getElementById('postInput').value = "";
            }
        };

        function ouvirFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("data", "desc")), (snap) => {
                const feed = document.getElementById('feed-lista');
                feed.innerHTML = "";
                snap.forEach(p => {
                    const d = p.data();
                    feed.innerHTML += `<div class="post-card"><b>${d.nome}:</b><br>${d.content}</div>`;
                });
            });
        }
    </script>
</body>
</html>
