<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackNet | Pro V7.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        /* VARIÁVEIS DE TEMA */
        :root { 
            --main: #00ff88; --bg: #0d1117; --card: #161b22; 
            --border: #30363d; --text: #ffffff; --text-gray: #8b949e; 
            --msg-other: #30363d; --input-bg: #161b22;
        }

        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --border: #dddddd; 
            --text: #1c1e21; --text-gray: #65676b; 
            --msg-other: #e4e6eb; --input-bg: #ffffff;
        }

        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; transition: 0.3s; }
        .hidden { display: none !important; }

        /* Nav */
        nav { background: var(--card); padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; align-items: center; }
        nav button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }

        /* Aba Perfil */
        .aba { max-width: 500px; margin: 0 auto; padding: 15px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; background: var(--main); }
        .post-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        
        /* Chat e Balões */
        #chat-geral-lista, #mensagens-privadas { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 10px; margin-bottom: 10px; }
        .msg-container { display: flex; flex-direction: column; max-width: 85%; width: fit-content; }
        .msg-container.me { align-self: flex-end; }
        .msg-container.other { align-self: flex-start; }
        
        .msg { padding: 10px 15px; font-size: 14px; border-radius: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me .msg { background: var(--main); color: black; border-bottom-right-radius: 2px; }
        .other .msg { background: var(--msg-other); color: var(--text); border-bottom-left-radius: 2px; }

        /* Audio Player Style */
        audio { height: 35px; width: 200px; margin-top: 5px; }

        /* Botão de Gravar */
        .btn-mic { background: #ff4444; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .btn-mic.recording { transform: scale(1.3); box-shadow: 0 0 15px #ff4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        input, textarea { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .reply-box { background: rgba(0,0,0,0.1); border-left: 3px solid var(--main); padding: 5px; font-size: 12px; margin-bottom: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen" style="height:100vh; display:flex; justify-content:center; align-items:center;">
        <div style="background:var(--card); padding:30px; border-radius:15px; text-align:center; border:1px solid var(--border); width:280px;">
            <h1>STACK<span>NET</span></h1>
            <input type="text" id="nome-usuario" placeholder="Teu nome...">
            <button onclick="entrar()" style="background:var(--main); border:none; padding:12px; width:100%; border-radius:8px; font-weight:bold; margin-top:10px;">Entrar</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav>
            <button onclick="mudarAba('feed')">🔥</button>
            <button onclick="mudarAba('chat-geral')">💬</button>
            <button onclick="mudarAba('users')">👥</button>
            <button onclick="mudarAba('perfil')">👤</button>
            <button onclick="toggleTheme()">🌓</button>
            <button onclick="sair()" style="color:#f44">✖</button>
        </nav>

        <div id="aba-perfil" class="aba hidden">
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center; border:1px solid var(--border);">
                <div class="avatar" id="perf-avatar" style="width:70px; height:70px; margin:0 auto; font-size:28px;"></div>
                <h2 id="perf-nome" style="margin:10px 0;"></h2>
                <div style="display:flex; justify-content:center; gap:20px; margin-bottom:15px;">
                    <div><b id="num-seguidores">0</b><br><small>Seguidores</small></div>
                    <div><b id="num-seguindo">0</b><br><small>Seguindo</small></div>
                </div>
                <textarea id="bioInput" placeholder="Sua bio..."></textarea>
                <button onclick="salvarBio()" style="background:var(--main); border:none; padding:10px; width:100%; border-radius:8px; font-weight:bold;">Salvar</button>
            </div>
        </div>

        <div id="aba-feed" class="aba">
            <textarea id="postInput" placeholder="O que há de novo?"></textarea>
            <button onclick="postar()" style="background:var(--main); border:none; padding:10px; width:100%; border-radius:8px; font-weight:bold;">Postar</button>
            <div id="feed-lista" style="margin-top:20px;"></div>
        </div>

        <div id="aba-chat-geral" class="aba hidden">
            <div id="chat-geral-lista"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chatGeralInput" placeholder="Chat geral...">
                <button onclick="enviarGeral()" style="background:var(--main); border:none; border-radius:8px; padding:0 15px;">Enviar</button>
            </div>
        </div>

        <div id="aba-users" class="aba hidden">
            <input type="text" id="buscaUsuario" placeholder="Procurar amigo...">
            <div id="lista-usuarios" style="margin-top:10px;"></div>
            
            <div id="janela-chat" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; flex-direction:column;">
                <div style="padding:15px; background:var(--card); display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border);">
                    <button onclick="fecharChat()">⬅</button>
                    <b id="chat-com-nome"></b>
                </div>
                <div id="mensagens-privadas"></div>
                <div id="texto-digitando" class="status-digitando" style="padding:0 15px; font-size:11px; color:var(--main);"></div>
                
                <div style="padding:15px; display:flex; gap:10px; align-items:center; background:var(--card); border-top:1px solid var(--border);">
                    <input type="text" id="msgPrivadaInput" placeholder="Mensagem..." style="flex:1">
                    <button id="btn-audio" class="btn-mic" onmousedown="iniciarGravacao()" onmouseup="pararGravacao()" ontouchstart="iniciarGravacao()" ontouchend="pararGravacao()">🎤</button>
                    <button onclick="enviarPrivado()" style="background:var(--main); border:none; border-radius:50%; width:50px; height:50px; font-weight:bold;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, updateDoc, increment, getDoc, where, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2byHMCCdXKUT5bfBTvcw0zzsIY6uQz88",
            authDomain: "rede-social-8f031.firebaseapp.com",
            projectId: "rede-social-8f031",
            storageBucket: "rede-social-8f031.firebasestorage.app",
            messagingSenderId: "439234666870",
            appId: "1:439234666870:web:b8dde1bdd07a247b61da57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNome = "", chatAtivoId = "", minhaCor = "#00ff88", mediaRecorder, audioChunks = [];

        // --- TEMA ---
        window.toggleTheme = () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        };
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

        // --- ENTRAR ---
        window.entrar = async () => {
            const nome = document.getElementById('nome-usuario').value.trim();
            if(nome) {
                meuNome = nome;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                await setDoc(doc(db, "usuarios", meuNome), { nome: meuNome, online: true }, { merge: true });
                carregarPerfil(); ouvirUsuarios(); ouvirFeed(); ouvirChatGeral();
            }
        };

        // --- GRAVAÇÃO DE ÁUDIO ---
        window.iniciarGravacao = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob); 
                reader.onloadend = async () => {
                    const base64Audio = reader.result;
                    if(base64Audio.length > 1000000) return alert("Áudio muito longo!");
                    enviarMensagemAudio(base64Audio);
                };
            };
            mediaRecorder.start();
            document.getElementById('btn-audio').classList.add('recording');
        };

        window.pararGravacao = () => {
            if(mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('btn-audio').classList.remove('recording');
            }
        };

        async function enviarMensagemAudio(base64) {
            const chatId = [meuNome, chatAtivoId].sort().join("_");
            await addDoc(collection(db, `chats/${chatId}/mensagens`), { 
                de: meuNome, audio: base64, data: Date.now(), lida: false 
            });
        }

        // --- LOGICA DE CHAT ---
        window.abrirChat = (id, corOutro) => {
            chatAtivoId = id;
            document.getElementById('janela-chat').classList.remove('hidden');
            document.getElementById('chat-com-nome').innerText = id;
            const chatId = [meuNome, id].sort().join("_");
            
            onSnapshot(query(collection(db, `chats/${chatId}/mensagens`), orderBy("data")), (snap) => {
                const box = document.getElementById('mensagens-privadas');
                box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.data();
                    const souEu = d.de === meuNome;
                    const conteudo = d.audio ? `<audio controls src="${d.audio}"></audio>` : d.texto;
                    box.innerHTML += `
                        <div class="msg-container ${souEu ? 'me' : 'other'}">
                            <div class="msg">${conteudo}</div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        // Funções auxiliares (postar, mudarAba, etc) mantidas para funcionamento...
        window.mudarAba = (aba) => {
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.getElementById('aba-' + aba).classList.remove('hidden');
        };
        window.enviarPrivado = async () => {
            const input = document.getElementById('msgPrivadaInput');
            if(input.value.trim()){
                const chatId = [meuNome, chatAtivoId].sort().join("_");
                await addDoc(collection(db, `chats/${chatId}/mensagens`), { de: meuNome, texto: input.value, data: Date.now() });
                input.value = "";
            }
        };
        window.fecharChat = () => document.getElementById('janela-chat').classList.add('hidden');
        window.sair = () => location.reload();

        // Escutadores básicos
        function ouvirFeed() { onSnapshot(query(collection(db, "posts"), orderBy("data", "desc")), s => {
            const f = document.getElementById('feed-lista'); f.innerHTML = "";
            s.forEach(p => { f.innerHTML += `<div class="post-card"><b>${p.data().nome}</b><p>${p.data().content}</p></div>`; });
        });}
        function ouvirUsuarios() { onSnapshot(collection(db, "usuarios"), s => {
            const l = document.getElementById('lista-usuarios'); l.innerHTML = "";
            s.forEach(u => { if(u.id !== meuNome) l.innerHTML += `<div class="post-card" onclick="abrirChat('${u.id}')">${u.id}</div>`; });
        });}
        async function carregarPerfil() { document.getElementById('perf-nome').innerText = meuNome; document.getElementById('perf-avatar').innerText = meuNome[0]; }
        window.postar = () => { const t = document.getElementById('postInput'); if(t.value) addDoc(collection(db, "posts"), { nome: meuNome, content: t.value, data: Date.now() }); t.value = ""; };
        function ouvirChatGeral() { onSnapshot(query(collection(db, "chat_geral"), orderBy("data")), s => {
            const l = document.getElementById('chat-geral-lista'); l.innerHTML = "";
            s.forEach(m => { l.innerHTML += `<div><b>${m.data().nome}:</b> ${m.data().texto}</div>`; });
        });}
        window.enviarGeral = () => { const i = document.getElementById('chatGeralInput'); if(i.value) addDoc(collection(db, "chat_geral"), { nome: meuNome, texto: i.value, data: Date.now() }); i.value = ""; };
    </script>
</body>
</html>
